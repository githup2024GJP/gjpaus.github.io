<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GJPAUS | Contact</title>
    <style>
        body { 
            margin: 0; 
            background: #000; 
            color: #fff; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            font-family: sans-serif;
        }
        .container { text-align: center; padding: 20px; }
        img.main-pic { 
            width: 100%; 
            max-width: 600px; 
            border-radius: 15px; 
            box-shadow: 0 0 30px rgba(255,255,255,0.1);
        }
        .links { margin-top: 30px; }
        .btn-yt { 
            display: inline-block; 
            padding: 15px 30px; 
            background: #ff0000; 
            color: #fff; 
            text-decoration: none; 
            border-radius: 50px; 
            font-weight: bold; 
            margin-bottom: 20px;
        }
        .email-link { 
            display: block; 
            color: #bdc3c7; 
            text-decoration: none; 
            font-size: 1.1rem;
        }
        .email-link:hover { color: #fff; }
    </style>
</head>
<body>

    <div class="container">
        <!-- ใส่รูปภาพที่คุณสร้างไว้ตรงนี้ โดยตั้งชื่อว่า logo.png -->
        <img src="logo.png" alt="GJPAUS Visual" class="main-pic">

        <div class="links">
            <a href="https://youtube.com" target="_blank" class="btn-yt">
                WATCH ON YOUTUBE
            </a>
            
            <a href="mailto:contact@gjpaus.com" class="email-link">
                📧 contact@gjpaus.com
            </a>
        </div>
    </div>

</body>
</html>
