<html lang="en">

  <style>
    :root {
      --bg: #050507;
      --bg-alt: #0b0b10;
      --gold: #f5c76a;
      --gold-soft: #d9a94f;
      --gold-deep: #b8862b;
      --text-main: #f7f7f7;
      --text-muted: #b3b3b3;
      --accent-red: #e53935;
      --accent-blue: #1e88e5;
      --accent-white: #f5f5f5;
      --radius-lg: 18px;
      --radius-md: 12px;
      --radius-pill: 999px;
      --shadow-soft: 0 0 40px rgba(0, 0, 0, 0.8);
      --shadow-gold: 0 0 30px rgba(245, 199, 106, 0.35);
      --border-subtle: 1px solid rgba(255, 255, 255, 0.06);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text",
        "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #151520 0, #050507 55%, #000 100%);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 24px;
    }

    .page {
      width: 100%;
      max-width: 1120px;
      background: linear-gradient(145deg, #050507 0, #0b0b10 40%, #050507 100%);
      border-radius: 28px;
      border: 1px solid rgba(245, 199, 106, 0.18);
      box-shadow: var(--shadow-soft), var(--shadow-gold);
      padding: 24px 28px 20px;
      position: relative;
      overflow: hidden;
    }

    /* subtle glow overlay */
    .page::before {
      content: "";
      position: absolute;
      inset: -40%;
      background:
        radial-gradient(circle at 10% 0, rgba(245, 199, 106, 0.12) 0, transparent 55%),
        radial-gradient(circle at 90% 0, rgba(245, 199, 106, 0.18) 0, transparent 60%);
      opacity: 0.9;
      pointer-events: none;
    }

    .page-inner {
      position: relative;
      z-index: 1;
    }

    /* top bar */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
      gap: 16px;
    }

    .handle {
      font-size: 14px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--gold-soft);
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .handle-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--gold);
      box-shadow: 0 0 10px rgba(245, 199, 106, 0.8);
    }

    .top-right {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .icon-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      border-radius: var(--radius-pill);
      border: 1px solid rgba(245, 199, 106, 0.35);
      background: radial-gradient(circle at top left, rgba(245, 199, 106, 0.18), #050507);
      font-size: 12px;
      color: var(--gold-soft);
    }

    .icon-pill span {
      font-size: 14px;
    }

    .flag {
      width: 32px;
      height: 20px;
      border-radius: 6px;
      overflow: hidden;
      box-shadow: 0 0 12px rgba(0, 0, 0, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.12);
    }

    .flag-inner {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
    }
