<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>GJPAUS | Pause. Protect Your Power.</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg: #050507;
      --bg-alt: #0b0b10;
      --gold: #f5c76a;
      --gold-soft: #e4b75c;
      --gold-deep: #b8862b;
      --text-main: #f7f7f7;
      --text-muted: #b3b3b3;
      --radius-lg: 20px;
      --radius-md: 14px;
      --radius-pill: 999px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text",
        "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #151520 0, #050507 55%, #000 100%);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    .frame {
      width: 100%;
      max-width: 1200px;
      background: radial-gradient(circle at top, #151520 0, #050507 45%, #020204 100%);
      border-radius: 28px;
      border: 1px solid rgba(245, 199, 106, 0.18);
      box-shadow:
        0 0 40px rgba(0, 0, 0, 0.9),
        0 0 60px rgba(245, 199, 106, 0.25);
      padding: 26px 34px 22px;
      position: relative;
      overflow: hidden;
    }

    .frame::before {
      content: "";
      position: absolute;
      inset: -40%;
      background:
        radial-gradient(circle at 10% 0, rgba(245, 199, 106, 0.18) 0, transparent 55%),
        radial-gradient(circle at 90% 0, rgba(245, 199, 106, 0.16) 0, transparent 60%);
      opacity: 0.9;
      pointer-events: none;
    }

    .inner {
      position: relative;
      z-index: 1;
    }

    /* top row */
    .top-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }

    .handle {
      font-family: "Segoe Script", "Bradley Hand", system-ui, sans-serif;
      font-size: 18px;
      color: var(--gold-soft);
    }

    .top-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .flag {
      width: 40px;
      height: 26px;
      border-radius: 6px;
      overflow: hidden;
      box-shadow: 0 0 14px rgba(0, 0, 0, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.18);
    }

    .flag-inner {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    .flag-stripe {
      flex: 1;
    }

    .flag-stripe.red {
      background: #e53935;
    }

    .flag-stripe.white {
      background: #f5f5f5;
    }

    .flag-stripe.blue {
      background: #1e88e5;
    }

    .icon-link {
      font-size: 13px;
      color: var(--gold-soft);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 999px;
      border: 1px solid rgba(245, 199, 106, 0.4);
      background: radial-gradient(circle at top left, rgba(245, 199, 106, 0.18), #050507);
    }

    /* nav */
    .nav {
      display: flex;
      justify-content: center;
      gap: 40px;
      margin-bottom: 26px;
      font-size: 13px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .nav a {
      text-decoration: none;
      color: inherit;
      position: relative;
      padding-bottom: 4px;
    }

    .nav a.active {
      color: var(--gold);
    }

    .nav a.active::after {
      content: "";
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      bottom: 0;
      width: 22px;
      height: 2px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--gold), var(--gold-deep));
      box-shadow: 0 0 12px rgba(245, 199, 106, 0.9);
    }

    /* center content */
    .center {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      margin-bottom: 26px;
    }

    .logo-wrap {
      margin-bottom: 18px;
    }

    .logo-badge {
      width: 120px;
      height: 120px;
      border-radius: 40px;
      background: radial-gradient(circle at 30% 0, #fbe3a4, #f5c76a 40%, #b8862b 100%);
      box-shadow:
        0 0 30px rgba(245, 199, 106, 1),
        0 0 80px rgba(0, 0, 0, 1);
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .logo-badge::before {
      content: "";
      position: absolute;
      inset: 10%;
      border-radius: 32px;
      border: 1px solid rgba(255, 255, 255, 0.55);
      opacity: 0.8;
    }

    .logo-shield {
      width: 70%;
      height: 70%;
      border-radius: 32px;
      border: 2px solid rgba(43, 26, 5, 0.9);
      background: radial-gradient(circle at 30% 0, #fbe3a4, #f5c76a 40%, #b8862b 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      box-shadow: inset 0 0 10px rgba(255, 255, 255, 0.4);
    }

    .logo-letter {
      font-size: 52px;
      font-weight: 800;
      color: #2b1a05;
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
    }

    .logo-crown {
      position: absolute;
      top: 6px;
      font-size: 22px;
      color: #2b1a05;
      text-shadow: 0 0 8px rgba(255, 255, 255, 0.9);
    }

    .title-main {
      font-size: 40px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .title-main span {
      color: var(--gold);
    }

    .title-sub {
      font-size: 14px;
      letter-spacing: 0.26em;
      text-transform: uppercase;
      color: var(--gold-soft);
      margin-bottom: 16px;
    }

    .desc {
      max-width: 620px;
      font-size: 15px;
      line-height: 1.7;
      color: #e3e3e3;
      margin-bottom: 22px;
    }

    .desc strong {
      color: var(--gold-soft);
      font-weight: 600;
    }

    .buttons {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 10px;
    }

    .btn {
      border-radius: var(--radius-pill);
      padding: 12px 26px;
      font-size: 13px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      border: none;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      text-decoration: none;
      transition: transform 0.12s ease, box-shadow 0.12s ease, background 0.12s ease;
      white-space: nowrap;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--gold), var(--gold-deep));
      color: #1a1205;
      box-shadow:
        0 0 22px rgba(245, 199, 106, 0.9),
        0 0 50px rgba(0, 0, 0, 1);
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow:
        0 0 26px rgba(245, 199, 106, 1),
        0 0 60px rgba(0, 0, 0, 1);
    }

    .btn-ghost {
      background: rgba(5, 5, 7, 0.8);
      color: var(--gold-soft);
      border: 1px solid rgba(245, 199, 106, 0.5);
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.9);
    }

      background: rgba(15, 15, 20, 0.95);
      transform: translateY(-1px);
      box-shadow:
        0 0 22px rgba(245, 199
