<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GJPAUS | Home</title>
    <style>
        :root {
            --gold: #d4af37;
            --gold-gradient: linear-gradient(135deg, #fcf6ba, #d4af37, #b8860b);
            --bg-black: #0a0a0a;
        }

        body {
            margin: 0;
            background-color: var(--bg-black);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
        }

        /* --- Header Section --- */
        header {
            padding: 60px 20px;
            background: radial-gradient(circle at center, #1a1a1a 0%, var(--bg-black) 100%);
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid var(--gold);
            margin-bottom: 20px;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
        }

        h1 {
            font-size: 3.5rem;
            margin: 0;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 5px;
        }

        .description {
            color: #ccc;
            max-width: 600px;
            margin: 20px auto;
            line-height: 1.6;
        }

        /* --- Video Section --- */
        .video-container {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            height: 0;
            border: 2px solid var(--gold);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.2);
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* --- Buttons --- */
        .btn-group {
            margin: 40px 0;
        }

        .btn {
            display: inline-block;
            padding: 12px 30px;
            margin: 10px;
            border: 2px solid var(--gold);
            color: white;
            text-decoration: none;
            text-transform: uppercase;
            font-weight: bold;
            border-radius: 5px;
            transition: 0.3s;
        }

        .btn:hover {
            background: var(--gold);
            color: black;
            box-shadow: 0 0 20px var(--gold);
        }

        footer {
            padding: 40px;
            font-size: 14px;
            color: #666;
        }
    </style>
</head>
<body>

    <header>
        <!-- ใส่รูปโปรไฟล์ของคุณที่นี่ -->
        <img src="your-profile-image.jpg" alt="GP Profile" class="profile-img">
        <h1>G P</h1>
        <p style="color: var(--gold); letter-spacing: 2px;">@gp9434</p>
        <p class="description">
            "คิดดี ทำดี แม้ยังไม่เห็นผล แค่จงยืนอยู่บนความดีของตัวเอง" <br>
            Pause. Protect Your Power.
        </p>
    </header>

    <div class="video-container">
        <h3>LATEST VIDEO</h3>
        <div class="video-wrapper">
            <!-- เปลี่ยน VIDEO_ID เป็นไอดีวิดีโอจาก YouTube ของคุณ -->
            <iframe src="https://youtube.com" frameborder="0" allowfullscreen></iframe>
        </div>
    </div>

    <div class="btn-group">
        <a href="https://youtube.com" target="_blank" class="btn">Subscribe on YouTube</a>
        <a href="#" class="btn">Contact Me</a>
    </div>

    <footer>
        &copy; 2026 GJPAUS.COM | All Rights Reserved.
    </footer>

</body>
</html>
