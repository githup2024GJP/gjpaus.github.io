<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GP9434 | Official Site</title>
    <style>
        /* ตั้งค่าหน้าจอให้เป็นสีดำสนิทและอยู่ตรงกลาง */
        body, html {
            margin: 0; padding: 0; height: 100%;
            background: #000; color: #fff;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .container { text-align: center; }

        /* ชื่อแบรนด์/ช่อง */
        h1 {
            font-size: 2.5rem;
            color: #fff;
            margin-bottom: 40px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* ตกแต่งปุ่ม YouTube ให้ดู Pro */
        .btn-yt {
            display: inline-block;
            padding: 18px 45px;
            background: #ff0000;
            color: #fff;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.2rem;
            box-shadow: 0 0 20px rgba(255,0,0,0.5);
            transition: 0.3s ease;
        }

        .btn-yt:hover {
            transform: scale(1.1);
            box-shadow: 0 0 35px #ff0000;
            background: #e60000;
        }

        /* อีเมลติดต่อ */
        .email {
            display: block;
            margin-top: 30px;
            color: #888;
            text-decoration: none;
            font-size: 1rem;
            transition: 0.3s;
        }

        .email:hover { color: #fff; }
    </style>
</head>
<body>

    <div class="container">
        <h1>@GP9434</h1>
        
        <a href="https://youtube.com" target="_blank" class="btn-yt">
            📺 SUBSCRIBE ON YOUTUBE
        </a>

        <a href="mailto:contact@gjpaus.com" class="email">
            📧 contact@gjpaus.com
        </a>
    </div>

</body>
</html>
