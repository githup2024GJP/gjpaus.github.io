<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GP9434 | Official Site</title>
    <style>
        /* จัดการพื้นฐานหน้าจอ */
        body, html { 
            margin: 0; padding: 0; height: 100%; 
            background: #000; overflow: hidden; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        }

        /* ส่วนแสดงรูปพื้นหลัง (รูปเวทีไฟส่อง) */
        .background {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.6)), url('logo.png');
            background-size: cover; 
            background-position: center; 
            z-index: -1;
        }

        /* ส่วนเนื้อหาและปุ่มด้านล่าง */
        .content {
            height: 100%; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: flex-end; 
            padding-bottom: 60px;
        }

        /* ตกแต่งปุ่ม YouTube */
        .btn-yt {
            padding: 16px 45px; 
            background: #ff0000; 
            color: #fff;
            text-decoration: none; 
            border-radius: 50px; 
            font-weight: bold;
            font-size: 1.1rem;
            box-shadow: 0 0 25px rgba(255,0,0,0.6); 
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            letter-spacing: 1px;
        }

        .btn-yt:hover { 
            transform: scale(1.1); 
            box-shadow: 0 0 40px #ff0000; 
            background: #e60000;
        }

        /* ตกแต่งอีเมล */
        .email { 
            margin-top: 25px; 
            color: rgba(255,255,255,0.7); 
            text-decoration: none; 
            font-size: 0.95rem;
            transition: 0.3s;
        }

        .email:hover { color: #fff; text-shadow: 0 0 10px rgba(255,255,255,0.5); }
    </style>
</head>
<body>

    <div class="background"></div>

    <div class="content">
        <!-- ลิงก์ตรงไปที่ช่อง YouTube ของคุณ -->
        <a href="https://youtube.com" target="_blank" class="btn-yt">
            📺 SUBSCRIBE ON YOUTUBE
        </a>
        
        <!-- ลิงก์อีเมลติดต่อ -->
        <a href="mailto:contact@gjpaus.com" class="email">
            📧 contact@gjpaus.com
        </a>
    </div>

</body>
</html>
