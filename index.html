<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GP9434 | Official Website</title>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%;
            background: #000; font-family: 'Sarabun', sans-serif;
            display: flex; align-items: center; justify-content: center;
        }
        .bg-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.7)), url('logo.png');
            background-size: cover; background-position: center;
            z-index: -1;
        }
        .content {
            text-align: center; color: white;
            padding: 30px; border-radius: 20px;
            backdrop-filter: blur(10px);
            background: rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .btn-yt {
            display: inline-block; padding: 15px 40px;
            background: #ff0000; color: #fff;
            text-decoration: none; border-radius: 50px;
            font-weight: bold; margin-bottom: 25px;
            transition: 0.3s;
        }
        .btn-yt:hover { transform: scale(1.1); background: #cc0000; }
        .email { color: #bdc3c7; text-decoration: none; }
    </style>
</head>
<body>
    <div class="bg-container"></div>
    <div class="content">
        <!-- ลิงก์ที่ถูกต้องไปยังช่องของคุณ -->
        <a href="https://www.youtube.com/@gp9434" target="_blank" class="btn-yt">
            📺 SUBSCRIBE ON YOUTUBE
        </a>
        <br>
        <a href="mailto:contact@gjpaus.com" class="email">📧 contact@gjpaus.com</a>
    </div>
</body>
</html>
