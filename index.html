<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GP9434 | Official Site</title>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%;
            background: #000; font-family: 'Sarabun', sans-serif;
            display: flex; align-items: center; justify-content: center;
        }
        /* พื้นหลังใช้รูปที่คุณส่งมา */
        .bg-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.8)), url('logo.png');
            background-size: cover; background-position: center;
            z-index: -1;
        }
        .content {
            text-align: center; color: white;
            padding: 20px; border-radius: 20px;
            backdrop-filter: blur(5px);
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .btn-yt {
            display: inline-block; padding: 15px 40px;
            background: #ff0000; color: #fff;
            text-decoration: none; border-radius: 50px;
            font-weight: bold; margin-bottom: 20px;
            box-shadow: 0 0 20px rgba(255,0,0,0.5);
            transition: 0.3s;
        }
        .btn-yt:hover { transform: scale(1.1); box-shadow: 0 0 30px #ff0000; }
        .email { color: #ccc; text-decoration: none; font-size: 1rem; opacity: 0.8; }
        .email:hover { opacity: 1; color: #fff; }
    </style>
</head>
<body>

    <div class="bg-container"></div>

    <div class="content">
        <div style="margin-bottom: 30px;">
            <a href="https://youtube.com" target="_blank" class="btn-yt">
                📺 VISIT MY YOUTUBE
            </a>
            <br>
            <a href="mailto:contact@gjpaus.com" class="email">
                📧 contact@gjpaus.com
            </a>
        </div>
    </div>

</body>
</html>
