<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard | GJPAUS</title>
    <style>
        :root {
            --gold: #f5c76a;
            --gold-soft: #e4b75c;
            --gold-deep: #b8862b;
            --text: #ffffff;
            --muted: #b3b3b3;
            --bg: #000000;
            --card-bg: #0a0a0a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #000 0%, #1a1a1a 50%, #000 100%);
            font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeIn 0.8s ease-out;
        }

        header h1 {
            font-size: 36px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        header h1 span {
            color: var(--gold);
        }

        header p {
            color: var(--muted);
            font-size: 14px;
            letter-spacing: 0.15em;
        }

        .search-section {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
            justify-content: center;
            animation: fadeIn 0.8s ease-out 0.2s both;
        }

        .search-box {
            display: flex;
            gap: 10px;
            background: var(--card-bg);
            border: 1px solid rgba(245, 199, 106, 0.2);
            border-radius: 16px;
            padding: 12px 18px;
            width: 100%;
            max-width: 400px;
        }

        .search-box input {
            background: none;
            border: none;
            color: var(--text);
            font-size: 14px;
            flex: 1;
            outline: none;
        }

        .search-box input::placeholder {
            color: var(--muted);
        }

        .search-box button {
            background: var(--gold);
            color: #1a1205;
            border: none;
            border-radius: 8px;
            padding: 8px 16px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.3s ease;
        }

        .search-box button:hover {
            background: var(--gold-soft);
            transform: translateY(-2px);
            box-shadow: 0 0 15px rgba(245, 199, 106, 0.4);
        }

        .weather-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            animation: fadeIn 0.8s ease-out 0.4s both;
        }

        .weather-card {
            background: linear-gradient(135deg, rgba(15, 15, 15, 0.8), rgba(20, 20, 25, 0.8));
            border: 1px solid rgba(245, 199, 106, 0.15);
            border-radius: 20px;
            padding: 28px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .weather-card::before {
            content: "";
            position: absolute;
            inset: -50%;
            background: radial-gradient(circle at 20% 50%, rgba(245, 199, 106, 0.1), transparent 60%);
            pointer-events: none;
        }

        .weather-card:hover {
            border-color: rgba(245, 199, 106, 0.4);
            box-shadow: 0 0 30px rgba(245, 199, 106, 0.2);
            transform: translateY(-5px);
        }

        .card-content {
            position: relative;
            z-index: 1;
        }

        .location {
            font-size: 18px;
            font-weight: 600;
            color: var(--gold);
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .weather-main {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .temp {
            font-size: 54px;
            font-weight: 800;
            color: var(--gold);
            line-height: 1;
        }

        .weather-icon {
            font-size: 48px;
        }

        .condition {
            font-size: 16px;
            color: var(--muted);
            text-transform: capitalize;
            margin-bottom: 20px;
        }

        .weather-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .detail-item {
            background: rgba(245, 199, 106, 0.05);
            border: 1px solid rgba(245, 199, 106, 0.1);
            border-radius: 12px;
            padding: 14px;
        }

        .detail-label {
            font-size: 12px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 6px;
        }

        .detail-value {
            font-size: 18px;
            font-weight: 600;
            color: var(--gold-soft);
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--muted);
        }

        .error {
            background: rgba(229, 57, 53, 0.1);
            border: 1px solid rgba(229, 57, 53, 0.3);
            color: #ff7875;
            padding: 16px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 20px;
            animation: slideDown 0.3s ease-out;
        }

        .no-data {
            text-align: center;
            padding: 60px 20px;
            color: var(--muted);
        }

        .no-data-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .nav-link {
            display: inline-block;
            margin-bottom: 30px;
            padding: 10px 20px;
            background: rgba(245, 199, 106, 0.1);
            border: 1px solid rgba(245, 199, 106, 0.3);
            border-radius: 8px;
            color: var(--gold);
            text-decoration: none;
            font-size: 13px;
            transition: all 0.3s ease;
        }

        .nav-link:hover {
            background: rgba(245, 199, 106, 0.2);
            box-shadow: 0 0 15px rgba(245, 199, 106, 0.2);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 24px;
            }

            .search-box {
                flex-direction: column;
            }

            .weather-grid {
                grid-template-columns: 1fr;
            }

            .temp {
                font-size: 42px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="nav-link">← Back to Home</a>

        <header>
            <h1><span>Weather</span> Dashboard</h1>
            <p>Real-time weather information for any location</p>
        </header>

        <div class="search-section">
            <div class="search-box">
                <input type="text" id="cityInput" placeholder="Search city (e.g., New York, London, Tokyo)">
                <button onclick="searchWeather()">Search</button>
            </div>
        </div>

        <div id="errorMessage" class="error" style="display: none;"></div>

        <div id="weatherContainer" class="weather-grid">
            <div class="no-data">
                <div class="no-data-icon">🌍</div>
                <p>Enter a city name to see the weather</p>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = 'b6fd43b94d4af21eab51bf9d4c007fb5'; // Free tier OpenWeatherMap
        const WEATHER_API_URL = 'https://api.openweathermap.org/data/2.5/weather';

        const weatherIcons = {
            'clear': '☀️',
            'clouds': '☁️',
            'rain': '🌧️',
            'drizzle': '🌦️',
            'thunderstorm': '⛈️',
            'snow': '❄️',
            'mist': '🌫️',
            'smoke': '💨',
            'haze': '🌫️',
            'dust': '🌪️',
            'fog': '🌫️',
            'sand': '🌪️',
            'ash': '💨',
            'squall': '💨',
            'tornado': '🌪️'
        };

        function getWeatherIcon(description) {
            const desc = description.toLowerCase();
            return weatherIcons[desc] || '🌤️';
        }

        async function searchWeather() {
            const city = document.getElementById('cityInput').value.trim();
            
            if (!city) {
                showError('Please enter a city name');
                return;
            }

            await fetchWeather(city);
        }

        async function fetchWeather(city) {
            const container = document.getElementById('weatherContainer');
            const errorDiv = document.getElementById('errorMessage');
            
            try {
                errorDiv.style.display = 'none';
                container.innerHTML = '<div class="loading">Fetching weather data...</div>';

                const response = await fetch(
                    `${WEATHER_API_URL}?q=${encodeURIComponent(city)}&units=metric&appid=${API_KEY}`
                );

                if (!response.ok) {
                    throw new Error('City not found. Please try another search.');
                }

                const data = await response.json();
                displayWeather(data);
                document.getElementById('cityInput').value = '';

            } catch (error) {
                showError(error.message);
                container.innerHTML = `
                    <div class="no-data">
                        <div class="no-data-icon">🌍</div>
                        <p>Enter a city name to see the weather</p>
                    </div>
                `;
            }
        }

        function displayWeather(data) {
            const container = document.getElementById('weatherContainer');
            const { name, sys, main, weather, wind, clouds, visibility } = data;

            const icon = getWeatherIcon(weather[0].main);
            const temp = Math.round(main.temp);
            const feelsLike = Math.round(main.feels_like);
            const humidity = main.humidity;
            const windSpeed = Math.round(wind.speed * 3.6); // Convert m/s to km/h
            const description = weather[0].description;
            const country = sys.country;

            const card = document.createElement('div');
            card.className = 'weather-card';
            card.innerHTML = `
                <div class="card-content">
                    <div class="location">${name}, ${country}</div>
                    
                    <div class="weather-main">
                        <div class="temp">${temp}°C</div>
                        <div class="weather-icon">${icon}</div>
                    </div>

                    <div class="condition">${description}</div>

                    <div class="weather-details">
                        <div class="detail-item">
                            <div class="detail-label">Feels Like</div>
                            <div class="detail-value">${feelsLike}°C</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Humidity</div>
                            <div class="detail-value">${humidity}%</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Wind Speed</div>
                            <div class="detail-value">${windSpeed} km/h</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Cloudiness</div>
                            <div class="detail-value">${clouds.all}%</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Pressure</div>
                            <div class="detail-value">${main.pressure} mb</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Visibility</div>
                            <div class="detail-value">${(visibility / 1000).toFixed(1)} km</div>
                        </div>
                    </div>
                </div>
            `;

            container.innerHTML = '';
            container.appendChild(card);
        }

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }

        // Load default city on page load
        window.addEventListener('load', () => {
            fetchWeather('New York');
        });

        // Allow Enter key to search
        document.getElementById('cityInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                searchWeather();
            }
        });
    </script>
</body>
</html>
